management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    '[com.example.notification]': DEBUG


example:
  notification:
    services:
      account-service-url: http://localhost:8081
